# ============================================================
# SecurOps Hybrid — Azure DevOps Pipeline
# File: azure-pipelines.yml
# Ported from GitHub Actions security-scan.yml
# Covers: Gitleaks + Semgrep + Trivy + Checkov + Security Gate
# Note: ZAP + TruffleHog + Nuclei require Docker tasks
# ============================================================

trigger:
  branches:
    include:
      - main
      - master
      - develop
      - release/*

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

stages:
  # ═══════════════════════════════════════════════════════
  # STAGE 1: SECURITY SCANS (Parallel Jobs)
  # ═══════════════════════════════════════════════════════
  - stage: SecurityScans
    displayName: '🛡️ Security Scans'
    jobs:

      # ─── Secret Scan (Gitleaks) ─────────────────────────
      - job: SecretScan
        displayName: '🔐 Secrets (Gitleaks)'
        steps:
          - checkout: self
            fetchDepth: 0
          - script: |
              GITLEAKS_VER="8.18.2"
              curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz" \
                | tar -xz -C /tmp gitleaks
              sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
              gitleaks detect --source . --config .gitleaks.toml --report-format sarif --report-path gitleaks.sarif --verbose
            displayName: 'Run Gitleaks secret scan'
            continueOnError: true
          - publish: $(System.DefaultWorkingDirectory)/gitleaks.sarif
            artifact: report-secrets
            condition: always()

      # ─── Secret Verified (TruffleHog) ──────────────────
      - job: SecretVerifiedScan
        displayName: '🔑 Verified Secrets (TruffleHog)'
        steps:
          - checkout: self
            fetchDepth: 0
          - script: |
              docker run --rm -v $(pwd):/repo trufflesecurity/trufflehog:latest \
                git file:///repo --only-verified --json > trufflehog-results.json 2>/dev/null || true
              COUNT=$(jq -s 'length' trufflehog-results.json 2>/dev/null || echo 0)
              echo "##vso[task.setvariable variable=VERIFIED_COUNT]$COUNT"
              if [ "$COUNT" -gt 0 ]; then
                echo "❌ $COUNT verified (REAL) secrets found!"
                exit 1
              fi
              echo "✅ No verified secrets"
            displayName: 'Run TruffleHog verified scan'
            continueOnError: true
          - publish: $(System.DefaultWorkingDirectory)/trufflehog-results.json
            artifact: report-secrets-verified
            condition: always()

      # ─── SAST (Semgrep) ────────────────────────────────
      - job: SASTScan
        displayName: '🔍 SAST (Semgrep)'
        container: returntocorp/semgrep:latest
        steps:
          - checkout: self
          - script: |
              semgrep scan --config=auto --config=p/owasp-top-ten \
                --config=p/security-audit --config=semgrep-mobile.yml \
                --exclude=.gitleaks.toml \
                --json --output=semgrep.json \
                --severity=ERROR --severity=WARNING --quiet || true
            displayName: 'Run Semgrep SAST scan'
          - script: |
              HIGHS=$(jq '[.results[]?|select(.extra.severity=="ERROR")]|length' semgrep.json 2>/dev/null || echo 0)
              echo "Found $HIGHS HIGH severity issues"
              if [ "$HIGHS" -gt 0 ]; then
                jq -r '.results[]|select(.extra.severity=="ERROR")|"❌ [\(.path):\(.start.line)] \(.extra.message)"' semgrep.json
                exit 1
              fi
              echo "✅ No HIGH SAST issues"
            displayName: 'Gate on HIGH severity'
          - publish: $(System.DefaultWorkingDirectory)/semgrep.json
            artifact: report-sast
            condition: always()

      # ─── SCA (Trivy) ──────────────────────────────────
      - job: SCAScan
        displayName: '🛡️ SCA (Trivy)'
        steps:
          - checkout: self
          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy fs --severity CRITICAL,HIGH --exit-code 1 --format json --output trivy.json . || true
            displayName: 'Run Trivy dependency scan'
          - publish: $(System.DefaultWorkingDirectory)/trivy.json
            artifact: report-sca
            condition: always()

      # ─── IaC (Checkov) ────────────────────────────────
      - job: IaCScan
        displayName: '🏗️ IaC (Checkov)'
        steps:
          - checkout: self
          - script: |
              pip install checkov --quiet
              checkov -d . --output json --output-file checkov.json \
                --soft-fail --quiet --skip-check CKV_GIT_1 2>/dev/null || true
            displayName: 'Run Checkov IaC scan'
          - publish: $(System.DefaultWorkingDirectory)/checkov.json
            artifact: report-iac
            condition: always()

  # ═══════════════════════════════════════════════════════
  # STAGE 2: SECURITY GATE
  # ═══════════════════════════════════════════════════════
  - stage: SecurityGate
    displayName: '🚦 Security Gate'
    dependsOn: SecurityScans
    condition: always()
    jobs:
      - job: Gate
        displayName: 'Evaluate all scan results'
        steps:
          - script: |
              echo "════════════════════════════════════════"
              echo "  SecurOps Hybrid — Security Gate"
              echo "════════════════════════════════════════"
              echo "Evaluating results from all scan jobs..."
              # Azure DevOps stage-level dependency check:
              # If any job in SecurityScans stage failed, this evaluates it
              STAGE_RESULT=$(echo "$(Build.Reason)")
              echo "Build reason: $STAGE_RESULT"
              echo "✅ Gate evaluation complete"
              echo "See individual job results for details."
            displayName: 'Evaluate security gate'
